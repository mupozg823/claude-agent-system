<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A1A3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;에이전트 개발국&quot;,&quot;short_name&quot;:&quot;개발국&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%231A1A3A&quot;,&quot;theme_color&quot;:&quot;%231A1A3A&quot;}">
<title>에이전트 개발국 ++ (Remote)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#FFD080;--gold-d:#8B6914;--gold-dd:#5A4008;--bg:#E8D8C0;--panel:#FFF0D0;--text:#2A1B0A;
  --ok:#44AA44;--err:#CC3300;--warn:#CCAA22;--info:#6666CC;--accent:#CC6600;
  --safe:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
  /* Kairosoft palette */
  --cream:#F5F1E8;--warm-red:#D4523C;--muted-teal:#6B9A8E;--rust:#8B6F47;
  --warm-bg:#E8DCC8;--accent-gold:#D4A032;--kairo-border:#C4A06A;--kairo-panel:#FFF6E8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#1A1A3A;color:var(--text);overflow:hidden;
  height:100vh;height:100dvh;user-select:none;-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;touch-action:manipulation}

/* ── App Shell (mobile-first) ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* ── Top Bar ── */
.top{background:#1A1A3A;border-bottom:3px solid var(--gold-d);display:flex;align-items:center;
  padding:2px 10px;padding-top:calc(2px + var(--safe-t));gap:8px;min-height:40px;flex-shrink:0;z-index:20}
.top .live{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s}
.live.on{background:#44CC44;box-shadow:0 0 8px #44CC44}
.live.off{background:#CC0000;box-shadow:0 0 8px #CC0000;animation:pulse 1.5s infinite}
@keyframes pulse{50%{opacity:.3}}
.top .logo{font-size:13px;font-weight:bold;color:var(--gold);text-shadow:1px 1px 0 #000;white-space:nowrap}
.top .logo .sub{font-size:9px;color:#BBCCDD;font-weight:normal}
.stats{display:flex;gap:6px;flex:1;justify-content:flex-end;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stats::-webkit-scrollbar{display:none}
.stat{color:#DDD;font-size:11px;display:flex;align-items:center;gap:2px;white-space:nowrap;flex-shrink:0}
.stat b{color:var(--gold);font-size:12px}
.stat .delta{font-size:8px;margin-left:1px}
.stat .delta.up{color:#44CC44}.stat .delta.dn{color:#CC3300}

/* ── Scene (fills available space) ── */
.scene{flex:1;position:relative;overflow:hidden;background:#D4C8A0;min-height:0}
canvas{display:block;width:100%;height:100%}

/* ── Connection Badge ── */
.conn{position:absolute;top:6px;right:8px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:bold;
  z-index:10;border:2px solid;transition:all .3s;backdrop-filter:blur(4px)}
.conn.on{background:#DFF5D0e0;color:#228B22;border-color:#228B22}
.conn.off{background:#FFD0D0e0;color:#CC0000;border-color:#CC0000}

/* ── Signal bars ── */
.signal{display:inline-flex;gap:1px;align-items:flex-end;height:10px;margin-left:4px;vertical-align:middle}
.signal i{width:3px;background:#228B22;border-radius:1px;transition:opacity .3s}
.signal i:nth-child(1){height:3px}.signal i:nth-child(2){height:5px}.signal i:nth-child(3){height:7px}.signal i:nth-child(4){height:10px}
.signal.weak i:nth-child(3),.signal.weak i:nth-child(4){opacity:.2}
.signal.mid i:nth-child(4){opacity:.2}

/* ── Toast Notifications ── */
.toast-wrap{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:4px;
  pointer-events:none;width:90%;max-width:360px}
.toast{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:bold;text-align:center;
  animation:toastIn .3s ease-out;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}.toast.hide{opacity:0;transform:translateY(-10px)}
.toast.ok{background:#228B22e0;color:#FFF}.toast.er{background:#CC0000e0;color:#FFF}.toast.in{background:#1A1A3Ae0;color:var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* ── Narration Bar ── */
.narr{background:#FFF8E8;border-top:3px solid var(--gold-d);display:flex;align-items:center;
  padding:6px 12px;gap:8px;min-height:40px;flex-shrink:0}
.narr .face{min-width:28px;height:24px;border-radius:4px;border:2px solid var(--gold-d);display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:bold;font-family:monospace;
  background:#1A1A3A;color:#44DD66;flex-shrink:0}
.narr .txt{flex:1;font-size:12px;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.narr .cur{color:var(--gold-d);animation:blink .8s step-end infinite;font-size:10px}
@keyframes blink{50%{opacity:0}}

/* ── Bottom Nav ── */
.bnav{display:flex;background:#1A1A3A;border-top:3px solid var(--gold-d);padding-bottom:var(--safe);flex-shrink:0;z-index:20}
.bnav .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:8px 4px;border:none;background:none;font-family:inherit;color:#888;font-size:9px;cursor:pointer;
  transition:all .2s;position:relative;min-height:48px;-webkit-tap-highlight-color:transparent}
.bnav .nb .ico{font-size:18px;transition:transform .2s}
.bnav .nb.active{color:var(--gold)}
.bnav .nb.active .ico{transform:scale(1.15)}
.bnav .nb:active{background:#2A2A5A}
.bnav .nb .badge{position:absolute;top:4px;right:calc(50% - 18px);min-width:16px;height:16px;
  background:var(--err);color:#FFF;font-size:8px;font-weight:bold;border-radius:8px;
  display:none;align-items:center;justify-content:center;padding:0 3px}
.bnav .nb .badge.show{display:flex}

/* ── Panel Overlay (Bottom Sheet) ── */
.panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#00000080;z-index:50;
  opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.panel-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg);
  border-radius:16px 16px 0 0;border-top:3px solid var(--gold-d);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,.32,1);
  max-height:85vh;display:flex;flex-direction:column;padding-bottom:var(--safe)}
.panel-overlay.open .panel-sheet{transform:translateY(0)}
.panel-handle{width:36px;height:4px;background:#C8A882;border-radius:2px;margin:8px auto 4px;flex-shrink:0}
.panel-tabs{display:flex;padding:0 8px;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.panel-tabs::-webkit-scrollbar{display:none}
.ptab{padding:8px 14px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:bold;
  color:#8B7860;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;
  min-height:44px;display:flex;align-items:center;gap:4px}
.ptab.active{color:var(--gold-dd);border-bottom-color:var(--gold-d)}
.ptab:active{background:#D4B89640}
.panel-body{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:#C8A882;border-radius:2px}

/* ── Log Entries ── */
.le{padding:6px 8px;margin-bottom:3px;border-radius:6px;border-left:4px solid #C8A882;background:#FFF8E8;line-height:1.4;
  transition:background .2s}
.le.ok{border-color:var(--ok)}.le.er{border-color:var(--err)}.le.wr{border-color:var(--warn)}.le.in{border-color:var(--info)}
.le .t{color:#8B7860;font-size:9px;margin-right:4px}
.le .n{color:var(--accent);font-weight:bold;margin-right:4px;font-size:11px}
.le .m{color:#4A3A2A;font-size:10px}

/* ── Metric Bars ── */
.sb{display:flex;align-items:center;gap:4px;margin-bottom:4px;min-height:22px}
.sb .n{width:54px;text-align:right;color:var(--gold-dd);font-size:10px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb .b{flex:1;height:14px;background:#444;border:1px solid #222;border-radius:3px;overflow:hidden;position:relative}
.sb .f{height:100%;min-width:1px;border-radius:2px;transition:width .6s ease}
.sb .v{width:32px;text-align:right;font-weight:bold;color:var(--err);font-size:10px}
/* Sparkline in metric bar */
.sb .spark{position:absolute;right:2px;top:1px;height:12px;opacity:.4}

/* ── Agent Cards (Kairosoft style) ── */
.ac{display:flex;gap:8px;padding:8px 10px;margin-bottom:5px;background:var(--kairo-panel);
  border:2px solid var(--kairo-border);border-radius:8px;transition:all .3s;min-height:64px;position:relative}
.ac.on{background:#FFF0D0;border-color:var(--warm-red);box-shadow:0 2px 8px #D4523C20}
.ac .fc{width:40px;height:40px;border-radius:6px;border:2px solid var(--gold-d);display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .3s;position:relative}
.ac .fc .lvbadge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;background:var(--accent-gold);
  color:#FFF;font-size:8px;font-weight:bold;border-radius:9px;display:flex;align-items:center;justify-content:center;
  border:1.5px solid #FFF;box-shadow:0 1px 2px #0003}
.ac .i{flex:1;overflow:hidden}
.ac .nm{font-weight:bold;font-size:12px;color:var(--rust)}
.ac .rl{font-size:9px;color:var(--muted-teal);margin-left:4px}
.ac .tk{font-size:11px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
/* 4-stat bars (Kairosoft style) */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px;margin-top:4px}
.stat-bar{display:flex;align-items:center;gap:3px}
.stat-bar .sl{font-size:8px;color:var(--rust);width:12px;text-align:right;font-weight:bold}
.stat-bar .sb2{flex:1;height:5px;background:#DDD;border-radius:2px;overflow:hidden}
.stat-bar .sf{height:100%;border-radius:2px;transition:width .6s ease}
.stat-bar .sv{font-size:7px;color:#888;width:14px}
.pw{width:100%;height:6px;background:#444;margin-top:3px;overflow:hidden;border-radius:3px}
.pw .pf{height:100%;border-radius:3px;transition:width .6s ease}
/* Trait badges */
.traits{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.trait-badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;color:#FFF;font-weight:bold;border:1px solid #FFFFFF30}

/* Floor Navigation */
.floor-nav{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px;z-index:15}
.floor-btn{width:36px;height:30px;border:2px solid var(--gold-d);border-radius:6px;background:#1A1A3ACC;color:var(--gold);
  font-size:11px;font-weight:bold;cursor:pointer;position:relative;transition:all .2s;backdrop-filter:blur(4px)}
.floor-btn.active{background:var(--gold-d);color:#FFF;box-shadow:0 0 8px #FFD08060}
.floor-btn:active{transform:scale(.92)}
.fbadge{position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;
  background:var(--warm-red);display:none;box-shadow:0 0 4px var(--warm-red)}
.fbadge.show{display:block;animation:pulse 1.5s infinite}
.floor-label{font-size:8px;color:var(--gold);text-align:center;margin-top:2px;text-shadow:0 1px 2px #000;max-width:40px;word-break:keep-all}

/* ── Command Panel ── */
.cmd-area{padding:4px 0}
.cmd-row{display:flex;gap:6px;margin-bottom:6px}
.cmd-row input{flex:1;padding:10px 12px;background:#FFF8E8;color:var(--text);border:2px solid #C8A882;
  border-radius:8px;font-family:inherit;font-size:13px;min-height:44px}
.cmd-row input:focus{outline:none;border-color:var(--gold-d);box-shadow:0 0 0 3px #8B691430}
.cmd-row button{padding:10px 18px;background:linear-gradient(#FFE0A0,#FFC860);color:var(--gold-dd);
  border:2px solid var(--gold-d);border-radius:8px;font-family:inherit;font-size:13px;font-weight:bold;
  cursor:pointer;box-shadow:2px 2px 0 var(--gold-dd);min-height:44px;min-width:60px;
  transition:all .15s;active:transform:translateY(1px)}
.cmd-row button:active{transform:translateY(2px);box-shadow:0 0 0 var(--gold-dd)}
.quick-cmds{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.qc{padding:8px 14px;background:#FFF8E8;border:2px solid #D4B896;border-radius:8px;font-size:11px;
  cursor:pointer;font-family:inherit;color:var(--gold-dd);font-weight:bold;min-height:36px;
  transition:all .15s;display:flex;align-items:center;gap:4px}
.qc:active{background:#FFE8C0;border-color:var(--accent);transform:scale(.95)}
.cmd-hist{max-height:50vh;overflow-y:auto}
.cmd-entry{padding:6px 8px;margin-bottom:3px;border-radius:6px;border-left:4px solid var(--info);background:#FFF8E8;font-size:11px}
.cmd-entry .ct{color:var(--accent);font-weight:bold}
.cmd-entry .cs{font-size:9px;margin-left:4px}
.cmd-entry .cs.queued{color:var(--ok)}.cmd-entry .cs.rejected{color:var(--err)}.cmd-entry .cs.pending{color:var(--warn)}.cmd-entry .cs.executing{color:var(--accent);animation:pulse 1s infinite}

/* ── FAB (Floating Action Button) ── */
.fab{position:fixed;bottom:calc(60px + var(--safe));right:12px;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#FFE0A0,#FFC860);border:3px solid var(--gold-d);
  box-shadow:0 4px 12px #00000040,2px 2px 0 var(--gold-dd);color:var(--gold-dd);font-size:22px;
  cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;
  transition:all .2s;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.9)}
.fab.hide{transform:scale(0);opacity:0;pointer-events:none}

/* ── Setup Overlay ── */
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#1A1A3Af0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.setup-box{background:var(--panel);border:3px solid var(--gold-d);border-radius:12px;
  box-shadow:4px 4px 0 var(--gold-dd);padding:20px;max-width:380px;width:100%;
  max-height:90vh;overflow-y:auto;margin:auto}
.setup-box h2{color:var(--gold-dd);font-size:16px;margin-bottom:16px;text-align:center}
.setup-box label{display:block;font-size:11px;color:#8B7860;margin:12px 0 4px;font-weight:bold}
.setup-box input{width:100%;padding:10px 12px;background:#FFF8E8;color:var(--text);border:2px solid #C8A882;
  border-radius:8px;font-family:inherit;font-size:12px;min-height:44px}
.setup-box input:focus{outline:none;border-color:var(--gold-d)}
.setup-box button{width:100%;padding:14px;margin-top:20px;background:linear-gradient(#FFE0A0,#FFC860);
  color:var(--gold-dd);border:2px solid var(--gold-d);border-radius:8px;font-family:inherit;font-size:14px;
  font-weight:bold;cursor:pointer;box-shadow:2px 2px 0 var(--gold-dd);min-height:48px}
.setup-box button:active{transform:translateY(2px);box-shadow:none}
.setup-box .hint{font-size:9px;color:#8B7860;margin-top:10px;text-align:center}

/* ── DAG Visualization ── */
.dag-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 0}
.dag-wrap svg{display:block;margin:0 auto}
.dag-wrap text{font-family:inherit}

/* ── Heatmap ── */
.heatmap-wrap{padding:4px 0}
.heatmap-wrap svg{display:block;margin:0 auto}

/* ── Analytics ── */
.analytics-section{margin-bottom:10px}
.analytics-section b{font-size:11px;color:var(--gold-dd);display:block;margin-bottom:4px}

/* ── SSE Badge ── */
.conn.sse{background:#FFF0D0e0;color:#886600;border-color:#886600}

/* ── Skeleton Loading ── */
.skel{background:linear-gradient(90deg,#E8D8C0 25%,#F0E8D4 50%,#E8D8C0 75%);background-size:200%;
  animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* ── Desktop Override ── */
@media(min-width:768px){
  .fab{bottom:calc(60px + var(--safe));right:24px;width:56px;height:56px;font-size:24px}
  .panel-sheet{max-width:600px;margin:0 auto;left:50%;right:auto;transform:translateX(-50%) translateY(100%);width:100%}
  .panel-overlay.open .panel-sheet{transform:translateX(-50%) translateY(0)}
}
/* ── Landscape ── */
@media(max-height:400px) and (orientation:landscape){
  .narr{display:none}
  .bnav .nb{padding:4px;min-height:40px}
  .bnav .nb .ico{font-size:16px}
  .bnav .nb span:last-child{display:none}
}
</style>
</head>
<body>
<!-- Setup Overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>에이전트 개발국 ++ Remote</h2>
    <label>Supabase URL</label>
    <input id="cfgUrl" placeholder="https://xxxx.supabase.co" autocomplete="off">
    <label>Anon Key</label>
    <input id="cfgKey" placeholder="eyJhbGci..." autocomplete="off">
    <label>Session ID</label>
    <input id="cfgSession" placeholder="relay 시작 시 표시된 Session ID">
    <button onclick="doConnect()">접속</button>
    <div class="hint">설정은 localStorage에 저장됩니다. URL 파라미터로도 전달 가능.</div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="mainApp" style="display:none">
<!-- Top Bar -->
<div class="top">
  <div class="live off" id="lv"></div>
  <div class="logo">개발국 <span class="sub">Remote</span></div>
  <div class="stats">
    <div class="stat"><b id="sT">0</b>작업</div>
    <div class="stat"><b id="sA">0</b><span class="delta" id="sAd"></span>승인</div>
    <div class="stat"><b id="sD">0</b>차단</div>
    <div class="stat"><b id="sO">-</b>ops/m</div>
  </div>
</div>

<!-- Scene -->
<div class="scene">
  <canvas id="c"></canvas>
  <div class="conn off" id="cs">연결 대기<span class="signal" id="sig"><i></i><i></i><i></i><i></i></span></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <!-- Floor Navigation -->
  <div class="floor-nav" id="floorNav">
    <button class="floor-btn active" data-f="0" onclick="switchFloor(0)">1F<span class="fbadge" id="fb0"></span></button>
    <button class="floor-btn" data-f="1" onclick="switchFloor(1)">2F<span class="fbadge" id="fb1"></span></button>
    <button class="floor-btn" data-f="2" onclick="switchFloor(2)">3F<span class="fbadge" id="fb2"></span></button>
    <button class="floor-btn" data-f="b" onclick="toggleBuildingView()">🏢</button>
    <div class="floor-label" id="floorName">1F 코딩 연구실</div>
  </div>
</div>

<!-- Narration -->
<div class="narr">
  <div class="face" id="nf">SYS</div>
  <div class="txt" id="nt">에이전트 개발국 Remote에 오신 것을 환영합니다!</div>
  <div class="cur">▼</div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <button class="nb active" data-p="log" onclick="openPanel('log')">
    <span class="ico">📜</span><span>로그</span><span class="badge" id="logBadge">0</span>
  </button>
  <button class="nb" data-p="metrics" onclick="openPanel('metrics')">
    <span class="ico">📊</span><span>메트릭</span>
  </button>
  <button class="nb" data-p="agents" onclick="openPanel('agents')">
    <span class="ico">👥</span><span>직원</span>
  </button>
  <button class="nb" data-p="cmd" onclick="openPanel('cmd')">
    <span class="ico">💬</span><span>명령</span><span class="badge" id="cmdBadge">0</span>
  </button>
  <button class="nb" data-p="mcp" onclick="openPanel('mcp')">
    <span class="ico">🔌</span><span>MCP</span>
  </button>
  <button class="nb" data-p="dag" onclick="openPanel('dag')">
